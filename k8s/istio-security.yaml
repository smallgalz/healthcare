apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: medichain-peer-auth
  namespace: medichain-platform
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: medichain-authz
  namespace: medichain-platform
spec:
  selector:
    matchLabels:
      app: medichain-backend
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/medichain-platform/sa/medichain-sa"]
  - to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: medichain-frontend-authz
  namespace: medichain-platform
spec:
  selector:
    matchLabels:
      app: medichain-frontend
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
  - to:
    - operation:
        methods: ["GET"]
