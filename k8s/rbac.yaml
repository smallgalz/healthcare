apiVersion: v1
kind: ServiceAccount
metadata:
  name: medichain-sa
  namespace: medichain-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: medichain-platform
  name: medichain-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: medichain-rolebinding
  namespace: medichain-platform
subjects:
- kind: ServiceAccount
  name: medichain-sa
  namespace: medichain-platform
roleRef:
  kind: Role
  name: medichain-role
  apiGroup: rbac.authorization.k8s.io
