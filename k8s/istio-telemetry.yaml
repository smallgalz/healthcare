apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: medichain-telemetry
  namespace: medichain-platform
spec:
  metrics:
  - providers:
    - name: prometheus
  accessLogging:
  - providers:
    - name: envoy
  tracing:
  - providers:
    - name: jaeger
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: medichain-metrics
  namespace: medichain-platform
  labels:
    app: medichain-backend
spec:
  selector:
    matchLabels:
      app: medichain-backend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
