apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: medichain-gateway
  namespace: medichain-platform
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - medichain.example.com
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: medichain-tls
    hosts:
    - medichain.example.com
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: medichain-vs
  namespace: medichain-platform
spec:
  hosts:
  - medichain.example.com
  gateways:
  - medichain-gateway
  http:
  - match:
    - uri:
        prefix: /api
    route:
    - destination:
        host: medichain-backend-service
        port:
          number: 3000
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: medichain-frontend-service
        port:
          number: 80
    timeout: 10s
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: medichain-destination-rule
  namespace: medichain-platform
spec:
  host: medichain-backend-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
    loadBalancer:
      simple: LEAST_CONN
    circuitBreaker:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: medichain-frontend-destination-rule
  namespace: medichain-platform
spec:
  host: medichain-frontend-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
    loadBalancer:
      simple: LEAST_CONN
